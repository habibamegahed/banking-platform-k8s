server {
    listen 80;
    server_name _;

    # مهم: يخلي Nginx يعمل DNS resolve بشكل dynamic داخل Kubernetes
    resolver kube-dns.kube-system.svc.cluster.local valid=10s;

    # Serve the dashboard SPA
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* to banking-api service
    location /api/ {
        # استخدم FQDN الكامل علشان تتجنب أي مشاكل DNS
        set $upstream http://banking-api-service.banking.svc.cluster.local:3000;

        proxy_pass         $upstream;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }
}