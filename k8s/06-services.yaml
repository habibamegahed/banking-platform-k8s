apiVersion: v1
kind: Service
metadata:
  name: banking-api-service
  namespace: banking
spec:
  selector:
    app: banking-api
  ports:
    - port: 3000
      targetPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: banking-dashboard-service
  namespace: banking
spec:
  selector:
    app: banking-dashboard
  ports:
    - port: 80
      targetPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-db
  namespace: banking
spec:
  clusterIP: None
  selector:
    app: postgres-db
  ports:
    - port: 5432
